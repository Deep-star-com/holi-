<!DOCTYPE html>
<html>
<head>
<title>Holi Gift 🎁</title>
<style>
body {
    margin: 0;
    background: linear-gradient(to right, #ff512f, #dd2476);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
}

#container {
    max-width: 500px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: white;
    color: #dd2476;
    font-weight: bold;
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<div id="container">
    <h1>🎁 You Received a Holi Gift!</h1>
    <p>Click below to open your surprise 👇</p>
    <button onclick="startPrank()">Open Gift</button>
</div>

<audio id="beepSound" loop>
    <source src="https://www.soundjay.com/buttons/beep-07.mp3" type="audio/mpeg">
</audio>

<script>
let sound = document.getElementById("beepSound");

function startPrank() {

    document.getElementById("container").innerHTML =
    "<h2>⚠ System Alert ⚠</h2><p>Unknown activity detected...</p>";

    sound.play().catch(()=>{});

    // Vibrate for 5 seconds (if supported)
    if (navigator.vibrate) {
        navigator.vibrate([500, 200, 500, 200, 500, 200, 500]);
    }

    setTimeout(() => {
        sound.pause();
        showMessage();
    }, 5000);
}

function showMessage() {
    document.body.style.background =
    "linear-gradient(to right, #ff0080, #ff8c00, #40e0d0, #ff1493)";

    document.getElementById("container").innerHTML =
    "<h1>😎 Relax!</h1><h2>It's a Holi Prank! 🎨</h2><p>Wishing You a Very Happy Holi! 🌈</p>";
}
</script>

</body>
</html>
